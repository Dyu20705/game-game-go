[tool.ruff]
target-version = "py310"
line-length = 120
extend-exclude = [
  ".external",
  "contracts",
  "assets",
]

[tool.ruff.lint]
select = [
  "E4",
  "E7",
  "E9",
  "F",
  "I",
  "B006",
  "B008",
]
ignore = [
  "E741",
]

[tool.ruff.lint.per-file-ignores]
"**/__init__.py" = ["F401", "F403"]
"tests/**/*.py" = ["E402"]
"rofl/game-service/tests/**/*.py" = ["E402"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.coverage.run]
branch = true
source = ["src", "tools", "rofl/game-service/src"]
omit = [
  "*/__pycache__/*",
  "tests/*",
  "contracts/*",
  ".external/*",
]

[tool.coverage.report]
show_missing = true
skip_empty = true
