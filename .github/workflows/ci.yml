name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install -r requirements.txt
      - run: python -m pip install pytest pytest-cov ruff
      - run: python -m ruff check src tests tools rofl/game-service/src rofl/game-service/tests
      - run: python -m ruff format --check src tests tools rofl/game-service/src rofl/game-service/tests
      - run: python -m compileall src tests tools rofl/game-service/src rofl/game-service/tests
      - run: python -m tools.check_links
      - run: python -m tools.smoke_test
      - run: python -m pytest --cov --cov-report=term-missing --cov-report=xml -q -p no:cacheprovider
      - uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.12'
        with:
          name: coverage-xml
          path: coverage.xml

  rofl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - run: python -m pytest rofl/game-service/tests tests/platform/blockchain/test_result_commitments.py -q --junitxml=rofl-results.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rofl-test-results
          path: rofl-results.xml

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check obvious private material
        run: |
          ! git grep -InE "(BEGIN (RSA |EC |OPENSSH )?PRIVATE[[:space:]]KEY|PRIVATE[_]KEY=.+|MNEMONIC[=].+)" -- \
            ':!docs/**' \
            ':!.env.example'

  dependency-audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install pip-audit
      - run: python -m pip_audit -r requirements.txt
