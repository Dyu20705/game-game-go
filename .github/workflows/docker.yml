name: Docker

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -t game-game-go:ci .
      - run: docker run --rm game-game-go:ci smoke
