[pytest]
norecursedirs =
    .git
    .test_tmp
    .pytest_cache
    pytest-cache-files-*
markers =
    unit: fast unit tests for pure/domain logic
    integration: tests crossing platform/service boundaries
    architecture: AST dependency and package-boundary tests
    pygame: tests that initialize or render with Pygame
    blockchain: local blockchain and verifier-boundary tests
    rofl: ROFL service-boundary tests
    smoke: bounded end-to-end smoke checks
